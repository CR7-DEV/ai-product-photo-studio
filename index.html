<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Studio Suite Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .pink-strategy-box {
            border: 3px solid #db2777;
            color: #be185d;
            font-weight: 800;
            background-color: #fff1f2;
        }
        /* High-Definition Contrast Filter Matrix for Facial Sharpness */
        .transformed-masterpiece-live {
            filter: contrast(1.22) brightness(1.06) saturate(1.15) sharpness(1.5);
            border: 6px solid #ffffff;
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }
        .share-btn { transition: all 0.2s ease-in-out; }
        .share-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
        <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-6">✨ AI Multi-Studio Suite Pro</h1>
        
        <div class="bg-gray-900 rounded-xl p-4 mb-6 text-center shadow-lg border border-gray-700">
            <p class="text-white text-sm">⚡ Pro Plan: Get Unlimited 4K Transformations & Priority Access.</p>
            <button class="mt-2 bg-pink-600 text-white text-xs font-bold py-1 px-4 rounded-full hover:bg-pink-700">Billing: ₹99/month</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setStudio('product')" id="btn-product" class="studio-btn p-3 text-sm font-semibold rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 transition">🛍️ Product</button>
            <button onclick="setStudio('linkedin')" id="btn-linkedin" class="studio-btn p-3 text-sm font-semibold rounded-xl border border-gray-200 text-gray-700 transition">👔 LinkedIn</button>
            <button onclick="setStudio('dating')" id="btn-dating" class="studio-btn p-3 text-sm font-semibold rounded-xl border border-gray-200 text-gray-700 transition">❤️ Dating</button>
            <button onclick="setStudio('instagram')" id="btn-instagram" class="studio-btn p-3 text-sm font-semibold rounded-xl border border-gray-200 text-gray-700 transition">📸 Instagram</button>
        </div>

        <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Source Photo:</label>
        <div class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 mb-6 relative hover:bg-gray-100 transition">
            <input type="file" id="imageInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*" onchange="updateUploadStatus()" />
            <p id="upload-status" class="text-gray-500 text-sm text-center pointer-events-none">📸 Click to upload photo or Drag & Drop</p>
        </div>

        <textarea id="promptInput" rows="2" class="w-full p-4 border border-gray-300 rounded-xl mb-4 text-gray-700 shadow-sm focus:ring-2 focus:ring-indigo-500" placeholder="What should I fix in this photo?"></textarea>
        <button onclick="generatePhoto()" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-md hover:bg-indigo-700 transition">Generate Master Shot 🚀</button>

        <div id="resultContainer" class="hidden mt-8">
            <div id="backdropWrapper" class="p-6 rounded-2xl flex flex-col items-center mb-4 border transition-all duration-500">
                <span id="badgeStudio" class="text-white font-bold text-xs px-4 py-1 rounded-full mb-4 shadow-md uppercase tracking-wider"></span>
                <img id="outputImage" class="w-full rounded-xl mb-2" crossOrigin="anonymous">
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                <button onclick="downloadImage()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-xl shadow-lg">💾 Download Masterpiece</button>
                <button onclick="nativeShare()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg">🔗 Quick Share (All Apps)</button>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl mb-4 border border-gray-200">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 text-center">Share Directly To:</p>
                <div class="grid grid-cols-3 sm:grid-cols-5 gap-2">
                    <button onclick="shareTo('whatsapp')" class="share-btn bg-green-500 text-white text-xs font-bold py-2 px-1 rounded-lg shadow text-center">WhatsApp</button>
                    <button onclick="shareTo('instagram')" class="share-btn bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 text-white text-xs font-bold py-2 px-1 rounded-lg shadow text-center">Instagram</button>
                    <button onclick="shareTo('facebook')" class="share-btn bg-blue-600 text-white text-xs font-bold py-2 px-1 rounded-lg shadow text-center">Facebook</button>
                    <button onclick="shareTo('linkedin')" class="share-btn bg-blue-700 text-white text-xs font-bold py-2 px-1 rounded-lg shadow text-center">LinkedIn</button>
                    <button onclick="shareTo('snapchat')" class="share-btn bg-yellow-400 text-gray-900 text-xs font-bold py-2 px-1 rounded-lg shadow text-center">Snapchat</button>
                </div>
            </div>

            <div class="p-6 pink-strategy-box rounded-xl">
                <h3 class="text-lg mb-3">⚡ Strategic Action Blueprint:</h3>
                <div id="strategyBox" class="whitespace-pre-line leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        let currentStudio = 'product';
        
        function updateUploadStatus() {
            const input = document.getElementById('imageInput');
            if(input.files && input.files[0]) {
                document.getElementById('upload-status').innerHTML = `<span class="text-indigo-600 font-bold">⚡ Loaded: ${input.files[0].name}</span>`;
            }
        }

        function setStudio(type) {
            currentStudio = type;
            document.querySelectorAll('.studio-btn').forEach(btn => {
                btn.classList.remove('border-2', 'border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                btn.classList.add('border', 'border-gray-200', 'text-gray-700');
            });
            const activeBtn = document.getElementById(`btn-${type}`);
            if (activeBtn) {
                activeBtn.classList.remove('border', 'border-gray-200', 'text-gray-700');
                activeBtn.classList.add('border-2', 'border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
            }
        }

        async function generatePhoto() {
            const prompt = document.getElementById('promptInput').value;
            const fileInput = document.getElementById('imageInput');
            
            if (!fileInput.files || !fileInput.files[0]) return alert('Please upload a photo first!');
            if (!prompt) return alert('Please enter details!');

            const submitBtn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            const outputImage = document.getElementById('outputImage');
            const wrapper = document.getElementById('backdropWrapper');
            const badge = document.getElementById('badgeStudio');
            
            submitBtn.innerText = 'AI Engine Reconstructing Face & Replacing Backdrop... ⚙️';
            submitBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);
                formData.append('prompt', prompt);
                formData.append('studio', currentStudio);

                const response = await fetch('/generate', { method: 'POST', body: formData });
                const data = await response.json();
                
                if(data.success) {
                    resultContainer.classList.remove('hidden');
                    outputImage.src = data.image_url;
                    outputImage.className = "w-full rounded-xl transformed-masterpiece-live";
                    
                    // Live UI Backdrop Replacer Layer
                    if (currentStudio === 'dating' || currentStudio === 'instagram') {
                        wrapper.className = "p-6 rounded-2xl flex flex-col items-center mb-4 border border-amber-300 bg-gradient-to-tr from-amber-400 via-pink-400 to-purple-500 shadow-xl";
                        badge.className = "bg-amber-600 text-white font-bold text-xs px-4 py-1 rounded-full mb-4 shadow-md uppercase tracking-wider";
                        badge.innerText = "🌅 Premium Golden Hour Studio Background Active";
                    } else if (currentStudio === 'linkedin') {
                        wrapper.className = "p-6 rounded-2xl flex flex-col items-center mb-4 border border-blue-300 bg-gradient-to-r from-slate-700 via-indigo-900 to-slate-800 shadow-xl";
                        badge.className = "bg-blue-600 text-white font-bold text-xs px-4 py-1 rounded-full mb-4 shadow-md uppercase tracking-wider";
                        badge.innerText = "👔 Professional Corporate Office Backdrop Active";
                    } else {
                        wrapper.className = "p-6 rounded-2xl flex flex-col items-center mb-4 border border-gray-300 bg-gradient-to-b from-gray-100 to-gray-300 shadow-xl";
                        badge.className = "bg-gray-700 text-white font-bold text-xs px-4 py-1 rounded-full mb-4 shadow-md uppercase tracking-wider";
                        badge.innerText = "🛍️ Clean E-Commerce Showcase Studio Active";
                    }

                    document.getElementById('strategyBox').innerText = data.strategy;
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Something went wrong during generation!');
            } finally {
                submitBtn.innerText = 'Generate Master Shot 🚀';
                submitBtn.disabled = false;
            }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = document.getElementById('outputImage').src;
            link.download = 'AI-Masterpiece.jpg';
            link.click();
        }

        function shareTo(p) { alert(`Ready to viral! Post directly to ${p.toUpperCase()}`); }
        function nativeShare() { alert("Use the direct social share matrix options!"); }
    </script>
</body>
</html>
